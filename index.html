<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Nduna | Digital Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/B_Nduna_Logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

    <script src="config.js"></script>
    <script src="script.js"></script>
</head>

<body>

    <header>
        <img src="images/B_Nduna_Logo_Transparent.webp" class="logo">
    </header>

    <!-- Profile Image Section -->
    <section class="profile">
        <div class="image-stack">
            <img src="images/Profile.webp" class="main-profile" alt="Profile Image">
        </div>
    
        <p>
            <a class="nav-link scroll-link" href="#portfolio">Tech</a>
            <span>|</span>
            <a class="nav-link scroll-link" href="#youtube">Sim Racing</a>
            <span>|</span>
            <a class="nav-link scroll-link" href="#music">Music</a>
        </p>  
    
        <div class="Social">
            <a href="https://www.instagram.com/bnduna_7/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@TorqueNest" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://x.com/bnduna_7" target="_blank"><i class="fab fa-twitter"></i></a> 
        </div>
    </section>

    <!-- Portfolio Section -->
<section class="portfolio">
    <h2>My Portfolio</h2>
    <a href="https://b-nduna.github.io/Portfolio/" target="_blank">
        <div class="portfolio-container">
            <img src="images/portfolio_website.webp" alt="My Portfolio">
        </div>
    </a>
</section>

    
    <!-- YouTube Videos -->
    <section class="youtube">
        <div class="video-card">
            <div class="thumbnail-container">
                <a id="yt-latest-link" href="#" target="_blank">
                    <img id="yt-latest-img" src="images/youtube-placeholder.jpg" alt="Latest Video">
                    <div class="play-button">
                        <i class="fas fa-play"></i>
                    </div>
                </a>
            </div>
            <div class="video-info">
                <h3 id="yt-video-title">Loading...</h3>
                <div class="video-stats">
                    <span class="upload-date" id="upload-date">Loading...</span>
                </div>
                <a id="yt-watch-btn" href="#" target="_blank" class="watch-button">
                    Watch Latest <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </section>
      

    

    <!-- Music Podcast -->
    <section class="music">
        <h2>Bassline Odyssey Podcast</h2>
        <iframe width="100%" height="200" src="https://hearthis.at/bassline-odyssey/embed/" frameborder="0" allowfullscreen></iframe>
    </section>


    <!-- Subscription Form -->
    <section class="subscribe">
        <h2>Stay Connected</h2>
        <p>Join for updates on projects, music, and more.</p>
        <form id="subscribe-form">
            <input type="text" id="name" placeholder="Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit">Submit</button>
        </form>
    </section>
    


</body>
</html>
