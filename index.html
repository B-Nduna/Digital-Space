<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bongani Nduna | Digital Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/B_Nduna_Logo.webp" type="image/x-icon">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</head>

<body>

    <header>
        <img src="images/B_Nduna_Logo_Transparent.webp" class="logo">
    </header>

    <!-- Profile Image Section -->
    <section class="profile">
        <div class="image-stack">
            <img src="images/Profile.webp" class="main-profile">
        </div>
        
        <p>Software Developer | Sim Racer | Music Enthusiast</p>

        <div class="Social">
            <a href="https://www.instagram.com/bnduna_7/" target="_blank"><i class="fa fa-instagram"></i></a>
            <a href="https://www.youtube.com/@TorqueNest" target="_blank"><i class="fa fa-youtube"></i></a>
            <a href="https://wa.me/+27603168301" target="_blank"><i class="fa fa-whatsapp"></i></a>
        </div>

    </section>

    <!-- Portfolio Section -->
<section class="portfolio">
    <h2>My Portfolio</h2>
    <a href="https://www.b-nduna.online" target="_blank">
        <div class="portfolio-container">
            <img src="images/portfolio_website.webp" alt="My Portfolio">
        </div>
    </a>
</section>

    
    <!-- YouTube Videos -->
    <section class="youtube">
        <h2>TorqueNest</h2>
        <div class="video">
            <a id="yt-latest-link" href="#" target="_blank">
              <img id="yt-latest-img" src="images/placeholder.jpg" alt="Latest Video">
            </a>
            <p id="yt-video-title">Latest upload loading...</p>
            <a id="yt-watch-btn" href="#" target="_blank">Watch Latest Content ▶</a>
          </div>
          
      </section>
      

    

    <!-- Music Podcast -->
    <section class="music">
        <h2>Bassline Odyssey Podcast</h2>
        <iframe width="100%" height="200" src="https://hearthis.at/bassline-odyssey/embed/" frameborder="0" allowfullscreen></iframe>
    </section>


    <!-- Subscription Form -->
    <section class="subscribe">
        <h2>Stay Connected</h2>
        <p>Join for updates on projects, music, and more.</p>
        <form id="subscribe-form">
            <input type="text" id="name" placeholder="Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit">Submit</button>
        </form>
    </section>
    


    <script src="script.js"></script>

</body>
</html>
